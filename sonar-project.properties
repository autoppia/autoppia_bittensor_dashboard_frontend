# SonarCloud project configuration
sonar.projectKey=autoppia_autoppia_bittensor_dashboard_frontend
sonar.organization=autoppia

# Project metadata
sonar.projectName=Autoppia Bittensor Dashboard Frontend
sonar.projectVersion=1.0

# Source code location
sonar.sources=apps/isomorphic/src,packages/isomorphic-core/src

# Exclusions
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/build/**,**/*.config.js,**/*.config.ts,**/public/**,**/*.d.ts,**/.turbo/**

# TypeScript/JavaScript settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Test exclusions (tests mezclados con código, usar solo exclusions)
sonar.test.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Coverage exclusions (if you have coverage)
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/node_modules/**,**/.next/**,**/dist/**,**/public/**
